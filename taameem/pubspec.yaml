name: taameem
description: تطبيق تعميم - منصة التواصل المجتمعي لأمن وسلامة المجتمع
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Map + Clustering
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^1.3.0

  # AI — Anthropic API
  http: ^1.2.1

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Auth
  intl_phone_field: ^3.2.0
  pin_code_fields: ^8.0.1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Utilities
  shared_preferences: ^2.3.1
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
