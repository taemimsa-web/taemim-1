name: taameem
description: تطبيق تعميم - منصة التواصل المجتمعي لأمن وسلامة المجتمع
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Map - مجاني بالكامل
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^1.3.0

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Phone Auth
  intl_phone_field: ^3.2.0
  pin_code_fields: ^8.0.1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Utils
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
